name: Elyria Pre-Effect Enforcement Harness CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "*.md"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q
